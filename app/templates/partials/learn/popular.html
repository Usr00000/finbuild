{% if error %}
  <div class="error"><strong>Error:</strong> {{ error }}</div>
{% else %}
  {% if terms and terms|length > 0 %}
    <div class="term-pills">
      {% for item in terms %}
        <form hx-get="/partials/learn/term" hx-target="#learn-term-result" hx-swap="innerHTML">
          <input type="hidden" name="q" value="{{ item.term }}" />
          <button type="submit" class="pill">{{ item.term }}</button>
        </form>
      {% endfor %}
    </div>
  {% else %}
    <p class="muted">No terms available yet.</p>
  {% endif %}
{% endif %}
